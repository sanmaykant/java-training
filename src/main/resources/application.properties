spring.application.name=management-system

# Use standard Spring properties that Render recognizes easily
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# This forces Hibernate to be ready for Postgres even if metadata fetch fails initially
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Ensure the driver is explicitly called out
spring.datasource.driver-class-name=org.postgresql.Driver