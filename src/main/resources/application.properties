# Use environment variables, but fallback to H2 if they aren't found (for local safety)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Remove the manual PostgreSQLDialect line—Hibernate will auto-detect it correctly
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true